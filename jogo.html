<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detetive — Mansão do Crime</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-l:#e8c96b;--gold-d:#8a6520;--cr:#8b1a1a;--cr-d:#5c0e0e;--cr-l:#c43a3a;--dk:#0d0a08;--dk2:#1a1410;--dk3:#2a2018;--parch:#f2e8d0;--parch2:#e8d8b0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Text',serif;background:var(--dk);color:var(--parch);overflow:hidden;width:100vw;height:100vh;user-select:none}

#gscreen{display:flex;width:100vw;height:100vh;flex-direction:column;overflow:hidden}

/* TOP BAR */
#topbar{height:50px;background:linear-gradient(90deg,#0d0a08,#1a1408,#0d0a08);border-bottom:2px solid var(--gold-d);display:flex;align-items:center;padding:0 14px;gap:14px;position:relative;z-index:50;flex-shrink:0}
#glogo{font-family:'Cinzel Decorative',serif;font-size:17px;color:var(--gold);text-shadow:0 0 10px rgba(201,168,76,.4);letter-spacing:2px}
.tbdiv{width:1px;height:22px;background:rgba(201,168,76,.3)}
#cpinfo{display:flex;align-items:center;gap:7px;font-family:'Cinzel',serif;font-size:13px}
#cpdot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.5)}
#cpname{color:var(--gold-l);font-weight:700}
.tbright{margin-left:auto;display:flex;gap:7px}
.tbtn{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;padding:5px 12px;cursor:pointer;letter-spacing:1px;border-radius:2px;transition:all .2s}
.tbtn:hover{background:rgba(201,168,76,.2)}

/* MAIN LAYOUT */
#main{flex:1;display:flex;overflow:hidden;min-height:0}

/* LEFT PANEL (MENU DE CARTAS) */
#lpanel{width:260px;flex-shrink:0;background:linear-gradient(180deg,#0d0a08,#12100a);border-right:2px solid rgba(201,168,76,.2);display:flex;flex-direction:column;overflow:hidden}
.phdr{padding:10px 14px;border-bottom:1px solid rgba(201,168,76,.15);font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold);background:rgba(0,0,0,0.3);text-align:center}
#mycp{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;justify-content:center;align-items:center}

/* VISUAL DE CARTA NO MENU LATERAL */
.menu-card-item {width:160px;height:120px;perspective:1000px;cursor:pointer}
.menu-card-inner {width:100%;height:100%;background:linear-gradient(135deg,#2a1e15,#140d07);border:2px solid var(--gold-d);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 12px rgba(0,0,0,0.6);transition:all 0.3s ease}
.menu-card-item:hover .menu-card-inner {border-color:var(--gold);transform:translateY(-4px);box-shadow:0 10px 20px rgba(201,168,76,0.15)}
.menu-card-icon {font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))}
.menu-card-label {font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--parch);font-weight:bold;text-align:center}

/* BOARD AREA (2D DETALHADO) */
#barea{flex:1;min-width:0;min-height:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#16120e}
#bcontainer{position:relative;max-width:100%;max-height:100%}
#mansion-svg{display:block;border:3px solid var(--gold-d);box-shadow:0 0 60px rgba(0,0,0,.9);border-radius:4px}

.tok-group{cursor:pointer}
.tok-group circle{transition:transform 0.3s ease}

/* BOTTOM BAR */
#bottom{height:110px;flex-shrink:0;background:linear-gradient(180deg,#0d0a08,#0a0806);border-top:2px solid rgba(201,168,76,.2);display:flex;align-items:center;padding:0 20px;gap:20px}
#darea{display:flex;align-items:center;gap:14px}
#dcon{display:flex;gap:8px}
.die{width:46px;height:46px;background:linear-gradient(135deg,#f5f0e8,#e8dcc8);border:2px solid var(--gold-d);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 8px rgba(0,0,0,.5);color:#1a1008}
.die.rolling{animation:dr .5s ease-in-out}
@keyframes dr{0%{transform:rotate(0)}50%{transform:rotate(180deg) scale(1.1)}100%{transform:rotate(360deg)}}

#rollbtn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--dk);border:none;padding:10px 20px;cursor:pointer;border-radius:2px;font-weight:bold}
#rollbtn:disabled{opacity:.4;cursor:not-allowed}
#steps{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1px;font-weight:600}

#actarea{display:flex;gap:10px;margin-left:auto}
.abtn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);color:var(--gold);padding:10px 20px;cursor:pointer;transition:all .2s;border-radius:2px;min-width:140px;text-align:center}
.abtn:hover:not(:disabled){background:rgba(201,168,76,0.18);border-color:var(--gold)}
.abtn:disabled{opacity:.3;cursor:not-allowed}

#phdisp{text-align:right;min-width:150px}
#phtitle{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--gold)}
#phdesc{font-family:'IM Fell English',serif;font-style:italic;font-size:12px;color:var(--parch2);opacity:.7;margin-top:2px}

/* MODALS GERAIS */
.gmodal{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}
.gmbox{background:linear-gradient(160deg,#1a1008,#2d1c08,#1a1008);border:3px solid var(--gold-d);padding:25px;max-width:440px;width:90%;position:relative;border-radius:4px}
.mtitle{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold);text-shadow:0 0 20px rgba(201,168,76,.3);text-align:center;margin-bottom:15px}
.mrow{margin-bottom:12px}
.mlabel{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold);opacity:.7;margin-bottom:4px}
.msel{width:100%;padding:8px 12px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);color:var(--parch);font-size:14px;border-radius:2px;outline:none;appearance:none}
.msel option{background:#1a1008;color:var(--parch)}
.mbtns{display:flex;gap:10px;margin-top:20px}
.mbtn{flex:1;padding:10px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;border:none;cursor:pointer;border-radius:2px}
.mbc{background:rgba(201,168,76,.1);color:var(--parch2);border:1px solid rgba(201,168,76,.2)}
.mbconf{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--dk);font-weight:bold}

/* MODAL DE EXIBIÇÃO DE CATEGORIAS (GALERIA DE CARTAS) */
#cardmodal .gmbox {max-width:85vw;width:800px;background:linear-gradient(145deg,#120e0a,#1f160e);padding:40px 30px;min-height:450px}
.close-modal-x {position:absolute;top:15px;right:20px;font-size:26px;color:var(--gold);cursor:pointer;font-family:'Cinzel',sans-serif;transition:all 0.2s;font-weight:bold}
.close-modal-x:hover {color:#fff;transform:scale(1.15)}

/* GRID DE CARTAS INDIVIDUAIS */
.cards-gallery-grid {display:grid;grid-template-columns:repeat(auto-fit, minmax(130px, 130px));gap:20px;justify-content:center;margin-top:20px;max-height:60vh;overflow-y:auto;padding:10px}

/* CARTA DE DUPLA FACE (FLIP) */
.flip-card-wrapper {perspective:1000px;width:130px;height:190px}
.flip-card-inner {width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);cursor:pointer}
.flip-card-inner.flipped {transform:rotateY(180deg)}

.card-face-back, .card-face-front {width:100%;height:100%;position:absolute;backface-visibility:hidden;border-radius:8px;border:2px solid var(--gold-d);box-shadow:0 4px 10px rgba(0,0,0,0.5)}
/* VERSO (SILHUETA ESCONDIDA) */
.card-face-back {background:linear-gradient(135deg,#2c1a10,#140a05);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--gold)}
.card-face-back .silh-icon {font-size:42px;opacity:0.3;filter:drop-shadow(0 2px 4px #000)}
.card-face-back .peek-txt {font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;opacity:0.5}

/* FRENTE (REVELADA) */
.card-face-front {transform:rotateY(180deg);background:linear-gradient(135deg,#321f14,#4d3524);display:flex;flex-direction:column;justify-content:space-between;align-items:center;padding:14px 8px;text-align:center}
.card-front-icon {font-size:36px;margin-top:10px}
.card-front-title {font-family:'IM Fell English',serif;font-size:14px;color:var(--parch);font-weight:bold;line-height:1.2}

/* RESPONSIVE */
@media (max-width: 860px) {
  #main{flex-direction:column-reverse}
  #lpanel{width:100%;height:140px;border-right:none;border-top:2px solid var(--gold-d)}
  #mycp{flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:10px;gap:15px;justify-content:flex-start}
  .menu-card-item{flex-shrink:0}
  #bottom{height:auto;padding:10px;flex-wrap:wrap;gap:10px;justify-content:space-between}
  #actarea{margin-left:0;width:100%;justify-content:center}
}
</style>
</head>
<body>

<div id="gscreen">
  <div id="topbar">
    <div id="glogo">🕯 DETETIVE</div>
    <div class="tbdiv"></div>
    <div id="cpinfo">
      <div id="cpdot"></div>
      <span id="cpname">—</span>
    </div>
    <div class="tbright">
      <button class="tbtn" onclick="openSug()" id="sugbtn" disabled>💬 SUGESTÃO</button>
      <button class="tbtn" onclick="openAcc()" id="accbtn" style="color:#ff9999;border-color:rgba(200,50,50,0.4)">⚖️ ACUSAÇÃO</button>
    </div>
  </div>

  <div id="main">
    <div id="lpanel">
      <div class="phdr">CADERNO DE EVIDÊNCIAS</div>
      <div id="mycp">
        <div class="menu-card-item" onclick="openGalleryModal('suspect')">
          <div class="menu-card-inner">
            <div class="menu-card-icon">🕵️</div>
            <div class="menu-card-label">VER SUSPEITOS</div>
          </div>
        </div>
        <div class="menu-card-item" onclick="openGalleryModal('weapon')">
          <div class="menu-card-inner">
            <div class="menu-card-icon">🪓</div>
            <div class="menu-card-label">VER ARMAS</div>
          </div>
        </div>
        <div class="menu-card-item" onclick="openGalleryModal('room')">
          <div class="menu-card-inner">
            <div class="menu-card-icon">🏰</div>
            <div class="menu-card-label">VER CÔMODOS</div>
          </div>
        </div>
      </div>
    </div>

    <div id="barea">
      <div id="bcontainer"></div>
    </div>
  </div>

  <div id="bottom">
    <div id="darea">
      <div id="dcon">
        <div class="die" id="die1">⚀</div>
        <div class="die" id="die2">⚁</div>
      </div>
      <button id="rollbtn" onclick="rollDice()">🎲 ROLAR DADOS</button>
      <div id="steps">PASSOS RESTANTES: <span id="stcount">0</span></div>
    </div>
    
    <div id="actarea">
      <button class="abtn" id="etbtn" onclick="endTurn()" disabled>⏭ ENCERRAR VEZ</button>
    </div>

    <div id="phdisp">
      <div id="phtitle">Ações</div>
      <div id="phdesc">Rolar os dados para andar</div>
    </div>
  </div>
</div>

<div class="gmodal" id="cardmodal">
  <div class="gmbox">
    <div class="close-modal-x" onclick="closeM('cardmodal')">✕</div>
    <div class="mtitle" id="mcard-title">CATEGORIA</div>
    <div class="cards-gallery-grid" id="gallery-grid-dest"></div>
  </div>
</div>

<div class="gmodal" id="sugmodal">
  <div class="gmbox">
    <div class="mtitle">💬 Fazer Sugestão</div>
    <div class="mrow"><div class="mlabel">SUSPEITO</div><select class="msel" id="sugsus"></select></div>
    <div class="mrow"><div class="mlabel">ARMA</div><select class="msel" id="sugwep"></select></div>
    <div class="mrow"><div class="mlabel">CÔMODO (SALA ATUAL)</div><div style="font-family:'IM Fell English',serif;font-style:italic;font-size:15px;color:var(--gold);padding:5px 0" id="sugroom">—</div></div>
    <div class="mbtns">
      <button class="mbtn mbc" onclick="closeM('sugmodal')">CANCELAR</button>
      <button class="mbtn mbconf" onclick="confirmSug()">CONFIRMAR</button>
    </div>
  </div>
</div>

<div class="gmodal" id="accmodal">
  <div class="gmbox">
    <div class="mtitle" style="color:#ff9999">⚖️ Acusação Final</div>
    <div class="mrow"><div class="mlabel">SUSPEITO</div><select class="msel" id="accsus"></select></div>
    <div class="mrow"><div class="mlabel">ARMA</div><select class="msel" id="accwep"></select></div>
    <div class="mrow"><div class="mlabel">CÔMODO</div><select class="msel" id="accroom"></select></div>
    <div class="mbtns">
      <button class="mbtn mbc" onclick="closeM('accmodal')">CANCELAR</button>
      <button class="mbtn mbconf" style="background:var(--cr);color:#fff" onclick="confirmAcc()">ACUSAR TOTAL!</button>
    </div>
  </div>
</div>

<script>
const SUSPECTS = [
  { id:'sr_marinho', name:'Sr. Marinho', icon:'🔹', color:'#4a7cb5' },
  { id:'profa_filomela', name:'Profa. Filomela', icon:'🔸', color:'#e8c96b' },
  { id:'srta_rose', name:'Srta. Rose', icon:'🔺', color:'#c43a3a' },
  { id:'coronel_mostarda', name:'Coronel Mostarda', icon:'💛', color:'#d4a313' },
  { id:'dona_branca', name:'Dona Branca', icon:'⚪', color:'#ffffff' },
  { id:'o_reverendo', name:'Reverendo Green', icon:'💚', color:'#3a8c4a' }
];

const WEAPONS = [
  { id:'corda', name:'Corda', icon:'🪢' },
  { id:'cano', name:'Cano de Ferro', icon:'🛠️' },
  { id:'faca', name:'Faca', icon:'🔪' },
  { id:'chave', name:'Chave Inglesa', icon:'🔧' },
  { id:'castical', name:'Castiçal', icon:'🕯' },
  { id:'revolver', name:'Revólver', icon:'🔫' }
];

const ROOMS = [
  { id:'study', name:'Escritório', icon:'✍', x:85, y:85 },
  { id:'library', name:'Biblioteca', icon:'📚', x:85, y:235 },
  { id:'billiard', name:'Sala de Sinuca', icon:'🎱', x:85, y:385 },
  { id:'conservatory', name:'Estufa', icon:'🌿', x:85, y:535 },
  { id:'hall', name:'Hall Central', icon:'🚪', x:275, y:125 },
  { id:'ballroom', name:'Salão de Baile', icon:'💃', x:275, y:495 },
  { id:'lounge', name:'Salão de Estar', icon:'🛋', x:465, y:85 },
  { id:'dining', name:'Sala de Jantar', icon:'🍷', x:465, y:285 },
  { id:'kitchen', name:'Cozinha', icon:'🍳', x:465, y:535 }
];

const ROOM_CONNECTIONS = {
  'study': ['library', 'hall', 'kitchen'],
  'library': ['study', 'billiard', 'hall'],
  'billiard': ['library', 'conservatory', 'ballroom'],
  'conservatory': ['billiard', 'ballroom', 'lounge'],
  'hall': ['study', 'library', 'lounge'],
  'ballroom': ['billiard', 'conservatory', 'kitchen', 'dining'],
  'lounge': ['hall', 'dining', 'conservatory'],
  'dining': ['lounge', 'ballroom', 'kitchen'],
  'kitchen': ['dining', 'ballroom', 'study']
};

let totalPlayersCount = parseInt(localStorage.getItem('cluedo_player_count')) || 3;
let players = [];
let activeTurnIndex = 0;
let diceRolled = false;
let stepsRemaining = 0;
let envelope = {};
let currentPhase = 'ROLL';
let dynamicFlipTimers = {};

function setupGame() {
    let crSus = SUSPECTS[Math.floor(Math.random()*SUSPECTS.length)];
    let crWep = WEAPONS[Math.floor(Math.random()*WEAPONS.length)];
    let crRom = ROOMS[Math.floor(Math.random()*ROOMS.length)];
    envelope = { suspect: crSus, weapon: crWep, room: crRom };

    let fullDeck = [...SUSPECTS, ...WEAPONS, ...ROOMS].filter(c => c.id!==crSus.id && c.id!==crWep.id && c.id!==crRom.id);
    fullDeck.sort(() => Math.random() - 0.5);

    for(let i=0; i<totalPlayersCount; i++) {
        players.push({
            index: i,
            name: `Jogador ${i + 1}`,
            character: SUSPECTS[i],
            cards: [],
            currentRoom: ROOMS[i % ROOMS.length].id,
            eliminated: false
        });
    }

    let pIdx = 0;
    while(fullDeck.length > 0) {
        players[pIdx % totalPlayersCount].cards.push(fullDeck.pop());
        pIdx++;
    }

    buildSVGBoard();
    populateSelects();
    startTurn();
}

// CONSTRUÇÃO DO TABULEIRO PLANO 2D ALTAMENTE DETALHADO (VINTAGE ARCHITECTURE PLAN)
function buildSVGBoard() {
    const container = document.getElementById('bcontainer');
    const w = 550, h = 620;
    
    let svg = `<svg id="mansion-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
    
    // Fundo Texturizado da Mansão (Asfalto/Pátio Escuro)
    svg += `<rect width="${w}" height="${h}" fill="#1b140f"/>`;
    svg += `<rect x="15" y="15" width="${w-30}" height="${h-30}" fill="#140e0a" stroke="#2c1e14" stroke-width="2"/>`;
    
    // Definição dos Aposentos em Formato Técnico 2D
    const blueprintRooms = [
      {id:'study', name:'Escritório', x:25, y:25, rw:120, rh:120, col:'#2a1e17', border:'#8a6520', floor:'rgba(201,168,76,0.05)'},
      {id:'library', name:'Biblioteca', x:25, y:175, rw:120, rh:120, col:'#1c2833', border:'#34495e', floor:'rgba(52,73,94,0.1)'},
      {id:'billiard', name:'Sala de Sinuca', x:25, y:325, rw:120, rh:120, col:'#143d24', border:'#27ae60', floor:'rgba(39,174,96,0.1)'},
      {id:'conservatory', name:'Estufa', x:25, y:475, rw:120, rh:120, col:'#0e312f', border:'#16a085', floor:'rgba(22,160,133,0.1)'},
      
      {id:'hall', name:'Hall Central', x:185, y:25, rw:180, rh:200, col:'#2d3135', border:'#7f8c8d', floor:'rgba(255,255,255,0.03)'},
      {id:'ballroom', name:'Salão de Baile', x:185, y:395, rw:180, rh:200, col:'#2a1b3d', border:'#8e44ad', floor:'rgba(142,68,173,0.08)'},
      
      {id:'lounge', name:'Salão de Estar', x:405, y:25, rw:120, rh:120, col:'#3a1414', border:'#c0392b', floor:'rgba(192,57,43,0.08)'},
      {id:'dining', name:'Sala de Jantar', x:405, y:175, rw:120, rh:220, col:'#3d2014', border:'#d35400', floor:'rgba(211,84,0,0.08)'},
      {id:'kitchen', name:'Cozinha', x:405, y:425, rw:120, rh:170, col:'#342514', border:'#f39c12', floor:'rgba(243,156,18,0.05)'}
    ];

    // Desenhar Linhas de Conexão Estilizadas (Passagens)
    blueprintRooms.forEach(r => {
        let activePlayer = players[activeTurnIndex];
        let isAccessible = currentPhase === 'MOVE' && stepsRemaining > 0 && (ROOM_CONNECTIONS[activePlayer.currentRoom] || []).includes(r.id);
        
        let strokeColor = isAccessible ? '#2ecc71' : r.border;
        let strokeWidth = isAccessible ? '3' : '2';
        
        // Caixa do Aposento
        svg += `
        <g onclick="handleRoomClick('${r.id}')" style="cursor:${isAccessible ? 'pointer' : 'default'}">
            <rect x="${r.x}" y="${r.y}" width="${r.rw}" height="${r.rh}" fill="${r.col}" stroke="${strokeColor}" stroke-width="${strokeWidth}"/>
            <rect x="${r.x+4}" y="${r.y+4}" width="${r.rw-8}" height="${r.rh-8}" fill="${r.floor}" stroke="rgba(201,168,76,0.15)" stroke-width="1" stroke-dasharray="4,2"/>
            
            <circle cx="${r.x+10}" cy="${r.y+10}" r="2" fill="${strokeColor}" opacity="0.5"/>
            <circle cx="${r.x+r.rw-10}" cy="${r.y+10}" r="2" fill="${strokeColor}" opacity="0.5"/>
            <circle cx="${r.x+10}" cy="${r.y+r.rh-10}" r="2" fill="${strokeColor}" opacity="0.5"/>
            <circle cx="${r.x+r.rw-10}" cy="${r.y+r.rh-10}" r="2" fill="${strokeColor}" opacity="0.5"/>
        </g>`;
    });

    // Segunda camada: Textos para não sobrepor linhas
    blueprintRooms.forEach(r => {
        let roomConfig = ROOMS.find(ro => ro.id === r.id);
        svg += `
        <g pointer-events="none">
            <text x="${roomConfig.x}" y="${roomConfig.y}" fill="var(--gold-l)" font-family="Cinzel" font-size="11" text-anchor="middle" font-weight="900" letter-spacing="1px">${roomConfig.icon} ${r.name.toUpperCase()}</text>
            <text x="${roomConfig.x}" y="${roomConfig.y + 16}" fill="rgba(242,232,208,0.3)" font-family="Crimson Text" font-size="9" text-anchor="middle" font-style="italic">Aposento Seguro</text>
        </g>`;
    });

    // Distribuição de Peões (Tokens de Jogadores) no Tabuleiro 2D
    let roomPopulations = {};
    players.forEach(p => {
        if(p.eliminated) return;
        if(!roomPopulations[p.currentRoom]) roomPopulations[p.currentRoom] = [];
        roomPopulations[p.currentRoom].push(p);
    });

    Object.keys(roomPopulations).forEach(rId => {
        let plist = roomPopulations[rId];
        let rData = ROOMS.find(ro => ro.id === rId);
        
        plist.forEach((p, idx) => {
            let offsetAngle = (idx / plist.length) * Math.PI * 2;
            let radius = plist.length > 1 ? 22 : 0;
            let tx = rData.x + Math.cos(offsetAngle) * radius;
            let ty = rData.y + 35 + Math.sin(offsetAngle) * radius; // Deslocado abaixo do texto
            let isCurrent = (activeTurnIndex === p.index);

            svg += `
            <g class="tok-group" transform="translate(${tx}, ${ty})">
                <circle cx="2" cy="3" r="14" fill="#000" opacity="0.6"/>
                <circle cx="0" cy="0" r="14" fill="${p.character.color}" stroke="#000" stroke-width="2"/>
                <circle cx="0" cy="0" r="11" fill="none" stroke="#fff" stroke-width="1" opacity="0.4"/>
                <circle cx="0" cy="0" r="17" fill="none" stroke="${isCurrent ? 'var(--gold-l)' : 'transparent'}" stroke-width="2" stroke-dasharray="5,2"/>
                <text x="0" y="4" font-size="12" text-anchor="middle" pointer-events="none">${p.character.icon}</text>
            </g>`;
        });
    });

    svg += `</svg>`;
    container.innerHTML = svg;
}

function rollDice() {
    if(diceRolled) return;
    
    let d1 = Math.floor(Math.random() * 6) + 1;
    let d2 = Math.floor(Math.random() * 6) + 1;
    
    document.getElementById('die1').classList.add('rolling');
    document.getElementById('die2').classList.add('rolling');
    
    setTimeout(() => {
        document.getElementById('die1').classList.remove('rolling');
        document.getElementById('die2').classList.remove('rolling');
        
        const diceGlyphs = ['⚀','⚀','⚁','⚂','⚃','⚄','⚅'];
        document.getElementById('die1').textContent = diceGlyphs[d1];
        document.getElementById('die2').textContent = diceGlyphs[d2];
        
        stepsRemaining = d1 + d2;
        diceRolled = true;
        currentPhase = 'MOVE';
        
        document.getElementById('stcount').textContent = stepsRemaining;
        document.getElementById('rollbtn').disabled = true;
        document.getElementById('etbtn').disabled = false;
        
        document.getElementById('phdesc').textContent = `Você tirou ${stepsRemaining} passos. Escolha um aposento demarcado para se mover.`;
        buildSVGBoard();
    }, 500);
}

function handleRoomClick(roomId) {
    if(currentPhase !== 'MOVE' || stepsRemaining <= 0) return;
    
    let activePlayer = players[activeTurnIndex];
    let validRooms = ROOM_CONNECTIONS[activePlayer.currentRoom] || [];
    if(!validRooms.includes(roomId)) return;
    
    stepsRemaining = 0;
    activePlayer.currentRoom = roomId;
    document.getElementById('stcount').textContent = stepsRemaining;
    
    document.getElementById('sugbtn').disabled = false;
    currentPhase = 'SUGGEST';
    document.getElementById('phdesc').textContent = `Você entrou no aposento! Realize uma Sugestão ou encerre a vez.`;
    
    buildSVGBoard();
}

function startTurn() {
    let cp = players[activeTurnIndex];
    if(cp.eliminated) {
        nextTurn();
        return;
    }

    diceRolled = false;
    stepsRemaining = 0;
    currentPhase = 'ROLL';
    
    document.getElementById('cpname').textContent = `${cp.name} (${cp.character.name})`;
    document.getElementById('cpdot').style.backgroundColor = cp.character.color;
    document.getElementById('stcount').textContent = '0';
    
    document.getElementById('rollbtn').disabled = false;
    document.getElementById('etbtn').disabled = true;
    document.getElementById('sugbtn').disabled = true;
    
    document.getElementById('phdesc').textContent = `Role os dados estruturais para iniciar seu turno de investigação.`;
    buildSVGBoard();
}

// NOVO SISTEMA: ABRE A GALERIA DA CATEGORIA SELECIONADA
function openGalleryModal(category) {
    let title = '';
    let silhIcon = '❓';
    let fullList = [];
    
    if(category === 'suspect') { title = 'FICHA DE SUSPEITOS'; silhIcon = '👤'; fullList = SUSPECTS; }
    if(category === 'weapon') { title = 'ARSENAL DE ARMAS'; silhIcon = '⚔️'; fullList = WEAPONS; }
    if(category === 'room') { title = 'PLANTA DE CÔMODOS'; silhIcon = '🏰'; fullList = ROOMS; }
    
    document.getElementById('mcard-title').textContent = title;
    let gridDest = document.getElementById('gallery-grid-dest');
    gridDest.innerHTML = '';
    
    let cp = players[activeTurnIndex];
    
    fullList.forEach((item, index) => {
        // Verifica se o jogador logado possui fisicamente essa carta
        let ownsCard = cp.cards.some(c => c.id === item.id);
        let displayName = ownsCard ? item.name : 'Desconhecido';
        let displayIcon = ownsCard ? (item.icon || '🃏') : silhIcon;
        
        let cardId = `fcard-${category}-${index}`;
        
        gridDest.innerHTML += `
        <div class="flip-card-wrapper" onclick="triggerCardFlip('${cardId}')">
            <div class="flip-card-inner" id="${cardId}">
                <div class="card-face-back">
                    <div class="silh-icon">${silhIcon}</div>
                    <div class="peek-txt">CLIQUE PARA ESPIAR</div>
                </div>
                <div class="card-face-front">
                    <div style="font-size:10px; font-family:'Cinzel'; color:var(--gold); opacity:0.6;">EVIDÊNCIA</div>
                    <div class="card-front-icon">${displayIcon}</div>
                    <div class="card-front-title">${displayName}</div>
                    <div style="font-size:9px; color:${ownsCard ? '#2ecc71':'#e74c3c'}; font-family:'Cinzel';">${ownsCard ? 'SUA CARTA':'OCULTA'}</div>
                </div>
            </div>
        </div>`;
    });
    
    document.getElementById('cardmodal').style.display = 'flex';
}

// SISTEMA DE FLIP INTELIGENTE AUTÔNOMO DE 2 SEGUNDOS
function triggerCardFlip(cardId) {
    let el = document.getElementById(cardId);
    if (!el || el.classList.contains('flipped')) return;
    
    // Limpa temporizadores antigos caso existam redundâncias
    if(dynamicFlipTimers[cardId]) clearTimeout(dynamicFlipTimers[cardId]);
    
    // Vira a carta para a face frontal
    el.classList.add('flipped');
    
    // Segura exibida por exatos 2 segundos (2000ms) e retorna automaticamente
    dynamicFlipTimers[cardId] = setTimeout(() => {
        el.classList.remove('flipped');
    }, 2000);
}

function endTurn() {
    nextTurn();
}

function nextTurn() {
    activeTurnIndex = (activeTurnIndex + 1) % totalPlayersCount;
    startTurn();
}

function openSug() {
    let cp = players[activeTurnIndex];
    let rObj = ROOMS.find(r => r.id === cp.currentRoom);
    document.getElementById('sugroom').textContent = rObj.name.toUpperCase();
    document.getElementById('sugmodal').style.display = 'flex';
}

function confirmSug() {
    let susSel = document.getElementById('sugsus').value;
    let wepSel = document.getElementById('sugwep').value;
    let cp = players[activeTurnIndex];
    let rObj = ROOMS.find(r => r.id === cp.currentRoom);

    closeM('sugmodal');
    
    let nextPlayerIdx = (activeTurnIndex + 1) % totalPlayersCount;
    let matchFound = null;

    for (let i = 0; i < totalPlayersCount - 1; i++) {
        let checker = players[(nextPlayerIdx + i) % totalPlayersCount];
        if (checker.index === cp.index) break;
        
        matchFound = checker.cards.find(c => c.id === susSel || c.id === wepSel || c.id === rObj.id);
        if (matchFound) {
            alert(`O ${checker.name} contestou a sua sugestão mostrando uma carta privada.`);
            break;
        }
    }

    if (!matchFound) {
        alert("Nenhum dos investigadores conseguiu refutar a sua sugestão!");
    }
    
    document.getElementById('sugbtn').disabled = true;
}

function openAcc() {
    document.getElementById('accmodal').style.display = 'flex';
}

function confirmAcc() {
    let sus = document.getElementById('accsus').value;
    let wep = document.getElementById('accwep').value;
    let rom = document.getElementById('accroom').value;
    let cp = players[activeTurnIndex];

    closeM('accmodal');

    if(envelope.suspect.id === sus && envelope.weapon.id === wep && envelope.room.id === rom) {
        alert(`FIM DE MISTÉRIO! O ${cp.name} solucionou o caso perfeitamente! Culpado: ${envelope.suspect.name} | Arma: ${envelope.weapon.name} | Local: ${envelope.room.name}.`);
        location.reload();
    } else {
        alert(`ACUSAÇÃO FALHOU! O ${cp.name} apontou pistas erradas e foi removido do caso.`);
        cp.eliminated = true;
        
        let alive = players.filter(p => !p.eliminated);
        if(alive.length === 0) {
            alert(`Todos falharam! A solução do crime era: ${envelope.suspect.name} usando ${envelope.weapon.name} no(a) ${envelope.room.name}.`);
            location.reload();
        } else {
            endTurn();
        }
    }
}

function closeM(id) { document.getElementById(id).style.display = 'none'; }

function populateSelects() {
    let sSus = document.getElementById('sugsus'), aSus = document.getElementById('accsus');
    let sWep = document.getElementById('sugwep'), aWep = document.getElementById('accwep');
    let aRom = document.getElementById('accroom');

    SUSPECTS.forEach(s => {
        sSus.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        aSus.innerHTML += `<option value="${s.id}">${s.name}</option>`;
    });
    WEAPONS.forEach(w => {
        sWep.innerHTML += `<option value="${w.id}">${w.name}</option>`;
        aWep.innerHTML += `<option value="${w.id}">${w.name}</option>`;
    });
    ROOMS.forEach(r => {
        aRom.innerHTML += `<option value="${r.id}">${r.name}</option>`;
    });
}

window.onload = setupGame;
</script>
