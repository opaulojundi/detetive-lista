<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detetive — Jogo Local</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-d:#8a6520;--cr:#8b1a1a;--cr-d:#5c0e0e;--dk:#0d0a08;--dk2:#1a1410;--parch:#f2e8d0;--parch2:#e8d8b0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Text',serif;background:var(--dk);color:var(--parch);overflow:hidden;width:100vw;height:100vh;user-select:none}

/* SELEÇÃO DE JOGADORES */
#setup-screen{position:fixed;inset:0;z-index:1000;background:radial-gradient(circle,#22150c,#0d0a08 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px}
.title{font-family:'Cinzel',serif;font-size:28px;color:var(--gold);letter-spacing:3px}
.btns{display:flex;gap:15px}
.btn{width:60px;height:60px;border-radius:50%;background:rgba(201,168,76,.1);border:2px solid var(--gold-d);color:var(--gold);font-family:'Cinzel',serif;font-size:22px;font-weight:700;cursor:pointer;transition:.2s}
.btn:hover{background:var(--gold);color:#000;transform:scale(1.1)}

/* TELA DE TRANSIÇÃO (PRIVACIDADE DO TURNO) */
#shield-screen{position:fixed;inset:0;z-index:900;background:radial-gradient(circle, #220e0e, #0a0505 80%);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#shield-btn{background:linear-gradient(135deg, var(--cr), var(--cr-d));border:1px solid var(--gold);color:var(--parch);font-family:'Cinzel',serif;font-size:14px;letter-spacing:2px;padding:14px 32px;cursor:pointer}

/* INTERFACE PRINCIPAL */
#game-screen{display:none;flex-direction:column;width:100vw;height:100vh}
#topbar{height:50px;background:#140f0c;border-bottom:1px solid var(--gold-d);display:flex;align-items:center;padding:0 20px;justify-content:space-between}
#cpname{font-family:'Cinzel',serif;font-weight:700;color:var(--gold);letter-spacing:2px;font-size:16px}

#main{flex:1;display:flex;overflow:hidden}
#lpanel{width:250px;background:#140f0c;border-right:1px solid var(--gold-d);display:flex;flex-direction:column;padding:15px;gap:20px}
.phdr{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:2px;border-bottom:1px solid rgba(201,168,76,.2);padding-bottom:5px}
.hcard{padding:10px;border-radius:4px;border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;gap:10px;background:linear-gradient(to right,#1c1612,#2a2018);margin-top:8px}

#barea{flex:1;background:#0d0a08;display:flex;align-items:center;justify-content:center;position:relative;padding:10px}
#bcontainer{width:760px;height:700px;position:relative;background:#1b140e;box-shadow:0 20px 50px rgba(0,0,0,.9);border:4px solid #2a1e15}

/* BLOCO DE NOTAS */
#rpanel{width:280px;background:#140f0c;border-left:1px solid var(--gold-d);display:flex;flex-direction:column;padding:15px;gap:10px;overflow-y:auto}
.nbrow{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02);font-size:13px}
.nbck{width:30px;height:22px;background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.2);text-align:center;line-height:22px;cursor:pointer;font-weight:700}
.nbck.checked{color:#55ff55}

/* PAINEL INFERIOR */
#bottom{height:70px;background:#140f0c;border-top:1px solid var(--gold-d);display:flex;align-items:center;padding:0 20px;gap:20px}
.die{width:36px;height:36px;background:var(--parch);color:#000;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;box-shadow:0 4px 8px rgba(0,0,0,.5)}
#rollbtn, .abtn{background:linear-gradient(to bottom,var(--gold),var(--gold-d));border:none;color:#000;font-family:'Cinzel',serif;font-weight:700;padding:8px 16px;cursor:pointer;letter-spacing:1px}
#rollbtn:disabled, .abtn:disabled{opacity:.3;cursor:not-allowed}

.room-group{transition: opacity 0.2s;}
.room-group.accessible{cursor:pointer; filter: drop-shadow(0 0 8px #33cc33);}
.room-group.accessible rect{stroke:#33cc33 !important; stroke-width:3px !important;}

/* TELAS DE FIM */
#endscreen{position:fixed;inset:0;z-index:2000;background:#050303;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
</style>
</head>
<body>

<div id="setup-screen">
  <div class="title">Quantas pessoas vão jogar?</div>
  <div class="btns">
    <button class="btn" onclick="initGame(3)">3</button>
    <button class="btn" onclick="initGame(4)">4</button>
    <button class="btn" onclick="initGame(5)">5</button>
    <button class="btn" onclick="initGame(6)">6</button>
  </div>
</div>

<div id="shield-screen">
  <div class="title" style="font-size:24px;">Aguardando próximo jogador...</div>
  <div style="font-family:'Cinzel',serif; color:var(--gold);" id="shield-next">Passar para Jogador</div>
  <button id="shield-btn" onclick="startTurn()">REVELAR MEU TURNO 👁️</button>
</div>

<div id="game-screen">
  <div id="topbar">
    <div id="cpname">VEZ DE: JOGADOR —</div>
    <div>
      <button class="abtn" id="sugbtn" onclick="makeAction('sugestao')" disabled>💬 SUGERIR</button>
      <button class="abtn" id="accbtn" onclick="makeAction('acusacao')" style="background:linear-gradient(to bottom, #ff5555, #8b1a1a); color:white;">⚖️ ACUSAR</button>
    </div>
  </div>
  
  <div id="main">
    <div id="lpanel">
      <div class="phdr">SUAS CARTAS</div>
      <div id="myclist"></div>
    </div>
    
    <div id="barea">
      <div id="bcontainer"></div>
    </div>
    
    <div id="rpanel">
      <div class="phdr">SEU BLOCO DE NOTAS</div>
      <div id="notebook-content"></div>
    </div>
  </div>
  
  <div id="bottom">
    <div class="die" id="die1">⚀</div>
    <div class="die" id="die2">⚁</div>
    <button id="rollbtn" onclick="rollDice()">🎲 ROLAR DADOS</button>
    <span id="steps-disp" style="font-family:'Cinzel',serif; color:var(--gold); display:none;">Passos: <span id="stcount">0</span></span>
    <button class="abtn" id="etbtn" onclick="endTurn()" style="margin-left:auto;" disabled>⏭ TERMINAR VEZ</button>
  </div>
</div>

<div id="endscreen">
  <div class="title" id="end-title">FIM DE JOGO</div>
  <div style="font-size:18px;" id="end-desc"></div>
  <button class="abtn" onclick="location.reload()">JOGAR NOVAMENTE</button>
</div>

<script>
const DATA = {
  suspects: [
    {id:'Scarlet', name:'Srta. Scarlet', color:'#ff3333', icon:'👠'},
    {id:'Mustard', name:'Coronel Mustard', color:'#ffcc00', icon:'🪖'},
    {id:'White', name:'Sra. White', color:'#ffffff', icon:'👵'},
    {id:'Green', name:'Reverendo Green', color:'#33cc33', icon:'📿'},
    {id:'Peacock', name:'Sra. Peacock', color:'#3366ff', icon:'🦚'},
    {id:'Plum', name:'Professor Plum', color:'#9933ff', icon:'🔮'}
  ],
  weapons: [
    {id:'Castiçal', name:'Castiçal', icon:'🕯'},
    {id:'Adaga', name:'Adaga', icon:'🗡'},
    {id:'Cano', name:'Cano de Chumbo', icon:'🛠'},
    {id:'Revolver', name:'Revólver', icon:'🔫'},
    {id:'Corda', name:'Corda', icon:'🪢'},
    {id:'Chave', name:'Chave Inglesa', icon:'🔧'}
  ],
  rooms: [
    {id:'Studio', name:'Estúdio', color:'#3a5366', x:30, y:30, w:180, h:150, draw:(x,y)=>`<circle cx="${x+50}" cy="${y+50}" r="20" fill="#222" opacity="0.6"/>`},
    {id:'Lounge', name:'Sala de Estar', color:'#7c3a3a', x:270, y:30, w:220, h:150, draw:(x,y)=>`<rect x="${x+40}" y="${y+60}" width="140" height="30" fill="#500" rx="4"/>`},
    {id:'Ballroom', name:'Salão de Festas', color:'#876a3a', x:550, y:30, w:180, h:150, draw:(x,y)=>`<ellipse cx="${x+90}" cy="${y+70}" rx="60" ry="30" fill="#654a2a" opacity="0.5"/>`},
    {id:'Library', name:'Biblioteca', color:'#3a6649', x:30, y:240, w:180, h:160, draw:(x,y)=>`<rect x="${x+20}" y="${y+20}" width="140" height="15" fill="#2e4d37"/>`},
    {id:'Cellar', name:'Porão (Envelope)', color:'#241f1b', x:270, y:240, w:220, h:160, draw:()=>''},
    {id:'Conservatory', name:'Estufa', color:'#6b3a6b', x:550, y:240, w:180, h:160, draw:(x,y)=>`<circle cx="${x+40}" cy="${y+40}" r="15" fill="#2e8b57" opacity="0.5"/>`},
    {id:'Billiard', name:'Salão de Bilhar', color:'#6b563a', x:30, y:460, w:180, h:160, draw:(x,y)=>`<rect x="${x+30}" y="${y+45}" width="120" height="70" fill="#060" stroke="#420" stroke-width="4"/>`},
    {id:'Hall', name:'Hall', color:'#4f3a6b', x:270, y:460, w:220, h:160, draw:(x,y)=>`<rect x="${x+80}" y="${y+40}" width="60" height="80" fill="#312244"/>`},
    {id:'Kitchen', name:'Cozinha', color:'#3a6666', x:550, y:460, w:180, h:160, draw:(x,y)=>`<rect x="${x+40}" y="${y+40}" width="100" height="80" fill="#244" rx="2"/>`}
  ]
};

// Caminhos adjacentes simplificados do tabuleiro real de Detetive
const ADJACENCIES = {
  'Studio': ['Library', 'Lounge'], 'Lounge': ['Studio', 'Ballroom', 'Cellar', 'Hall'], 'Ballroom': ['Lounge', 'Conservatory'],
  'Library': ['Studio', 'Billiard', 'Cellar'], 'Cellar': [], 'Conservatory': ['Ballroom', 'Kitchen', 'Cellar'],
  'Billiard': ['Library', 'Hall'], 'Hall': ['Billiard', 'Lounge', 'Kitchen'], 'Kitchen': ['Hall', 'Conservatory']
};

let players = [];
let turnIdx = 0;
let phase = 'Roll';
let diceValue = 0;
let solution = {};
let accessibleRooms = [];

// Inicializa o jogo e distribui as cartas fisicamente entre humanos
function initGame(count) {
  document.getElementById('setup-screen').style.display = 'none';
  
  for(let i=0; i<count; i++) {
    players.push({
      idx: i,
      name: `Jogador ${i+1}`,
      character: DATA.suspects[i],
      room: DATA.rooms[Math.floor(Math.random() * DATA.rooms.length)].id,
      cards: [],
      notebook: {},
      eliminated: false
    });
  }

  // Define crime oculto (Envelope Central)
  let sPool = [...DATA.suspects], wPool = [...DATA.weapons], rPool = [...DATA.rooms].filter(r=>r.id!='Cellar');
  solution = {
    suspect: sPool.splice(Math.floor(Math.random()*sPool.length), 1)[0],
    weapon: wPool.splice(Math.floor(Math.random()*wPool.length), 1)[0],
    room: rPool.splice(Math.floor(Math.random()*rPool.length), 1)[0]
  };

  // Junta o resto das cartas e distribui igualmente
  let deck = [];
  sPool.forEach(c => deck.push({name: c.name, icon: c.icon}));
  wPool.forEach(c => deck.push({name: c.name, icon: c.icon}));
  rPool.forEach(c => deck.push({name: c.name, icon: c.name.split(' ')[0] === 'Sala' ? '🛋️' : '🚪'}));
  deck.sort(() => Math.random() - 0.5);

  let p = 0;
  while(deck.length > 0) {
    players[p].cards.push(deck.pop());
    p = (p + 1) % players.length;
  }

  document.getElementById('game-screen').style.display = 'flex';
  nextTurnTransition();
}

function nextTurnTransition() {
  if (players.filter(p => !p.eliminated).length === 0) {
    showEnd(false, "Todos os investigadores erraram as acusações!");
    return;
  }
  if (players[turnIdx].eliminated) {
    turnIdx = (turnIdx + 1) % players.length;
    nextTurnTransition();
    return;
  }
  
  document.getElementById('shield-next').textContent = players[turnIdx].name + ` (${players[turnIdx].character.name})`;
  document.getElementById('shield-screen').style.display = 'flex';
}

function startTurn() {
  document.getElementById('shield-screen').style.display = 'none';
  phase = 'Roll';
  accessibleRooms = [];
  
  updateUI();
}

function updateUI() {
  let cp = players[turnIdx];
  document.getElementById('cpname').textContent = `VEZ DE: ${cp.name.toUpperCase()} (${cp.character.name.toUpperCase()})`;
  
  // Atualiza Cartas Virtuais do Jogador da vez
  let clist = document.getElementById('myclist');
  clist.innerHTML = '';
  cp.cards.forEach(c => {
    let d = document.createElement('div'); d.className = 'hcard';
    d.innerHTML = `<span>${c.icon}</span> <strong>${c.name}</strong>`;
    clist.appendChild(d);
  });

  // Atualiza Bloco de Notas do Jogador da vez
  let nb = document.getElementById('notebook-content');
  nb.innerHTML = '';
  let allItems = [...DATA.suspects, ...DATA.weapons, ...DATA.rooms];
  allItems.forEach(item => {
    let row = document.createElement('div'); row.className = 'nbrow';
    row.innerHTML = `<span>${item.icon || '🚪'} ${item.name}</span>`;
    let ck = document.createElement('div'); ck.className = 'nbck';
    if(cp.notebook[item.name]) { ck.classList.add('checked'); ck.textContent = '✗'; }
    ck.onclick = () => {
      cp.notebook[item.name] = !cp.notebook[item.name];
      ck.classList.toggle('checked');
      ck.textContent = cp.notebook[item.name] ? '✗' : '';
    };
    row.appendChild(ck); nb.appendChild(row);
  });

  // Renderiza Tabuleiro de Fotos/Vetor Realista
  renderBoard();

  // Controles de fluxo de botões
  document.getElementById('rollbtn').disabled = (phase !== 'Roll');
  document.getElementById('etbtn').disabled = (phase !== 'Action');
  document.getElementById('sugbtn').disabled = (phase !== 'Action' || cp.room === 'Cellar');
}

function renderBoard() {
  let html = `<svg width="760" height="700" viewBox="0 0 760 700" xmlns="http://www.w3.org/2000/svg">`;
  html += `<rect width="760" height="700" fill="#150f0c"/>`;
  
  DATA.rooms.forEach(r => {
    let isAcc = accessibleRooms.includes(r.id) && phase === 'Move';
    html += `<g class="room-group ${isAcc?'accessible':''}" onclick="if(${isAcc}) movePlayerTo('${r.id}')">`;
    // Fundo texturizado e colorido de cada cômodo igual ao de verdade
    html += `<rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="${r.color}" stroke="var(--gold-d)" stroke-width="2" rx="4"/>`;
    html += r.draw(r.x, r.y);
    html += `<text x="${r.x+r.w/2}" y="${r.y+30}" fill="var(--parch)" font-family="Cinzel" font-size="12" font-weight="700" text-anchor="middle">${r.name}</text>`;
    html += `</g>`;
  });

  // Desenha os Pinos/Fichas de cada Investigador Humano no Cômodo
  players.forEach((p, idx) => {
    if(p.eliminated) return;
    let rm = DATA.rooms.find(r => r.id === p.room);
    if(rm) {
      let px = rm.x + 25 + (idx * 30);
      let py = rm.y + rm.h - 30;
      html += `
        <circle cx="${px}" cy="${py}" r="12" fill="${p.character.color}" stroke="#000" stroke-width="2"/>
        <text x="${px}" y="${py+4}" font-size="11" text-anchor="middle" fill="${p.character.color==='#ffffff'?'#000':'#fff'}">${p.character.icon}</text>
      `;
    }
  });

  html += `</svg>`;
  document.getElementById('bcontainer').innerHTML = html;
}

function rollDice() {
  let d1 = Math.floor(Math.random()*6)+1;
  let d2 = Math.floor(Math.random()*6)+1;
  diceValue = d1 + d2;

  const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
  document.getElementById('die1').textContent = faces[d1-1];
  document.getElementById('die2').textContent = faces[d2-1];

  phase = 'Move';
  let start = players[turnIdx].room;
  // Calcula cômodos acessíveis baseado nas conexões reais
  accessibleRooms = ADJACENCIES[start] || [];
  
  document.getElementById('steps-disp').style.display = 'inline';
  document.getElementById('stcount').textContent = diceValue;

  updateUI();
}

function movePlayerTo(roomId) {
  players[turnIdx].room = roomId;
  phase = 'Action';
  accessibleRooms = [];
  document.getElementById('steps-disp').style.display = 'none';
  updateUI();
}

function makeAction(type) {
  let cp = players[turnIdx];
  if(type === 'sugestao') {
    // Sistema simplificado de sugestão local: pergunta para os próximos jogadores reais na mesa
    let susName = prompt("Digite o nome do SUSPEITO que deseja sugerir:");
    let wepName = prompt("Digite o nome da ARMA que deseja sugerir:");
    
    if(!susName || !wepName) return;

    let next = (turnIdx + 1) % players.length;
    let cardFound = null;
    let refuter = "";

    while(next !== turnIdx) {
      let match = players[next].cards.find(c => c.name.toLowerCase().includes(susName.toLowerCase()) || c.name.toLowerCase().includes(wepName.toLowerCase()) || c.name.toLowerCase().includes(DATA.rooms.find(r=>r.id===cp.room).name.toLowerCase()));
      if(match) {
        cardFound = match;
        refuter = players[next].name;
        break;
      }
      next = (next + 1) % players.length;
    }

    if(cardFound) {
      alert(`O ${refuter} provou que você está errado mostrando secretamente a carta:\n👉 ${cardFound.icon} ${cardFound.name}`);
    } else {
      alert("Nenhum jogador conseguiu contestar a sua sugestão!");
    }
    document.getElementById('sugbtn').disabled = true;
  } else {
    // Acusação Final (Se errar é eliminado do tabuleiro)
    let s = prompt("Qual o SUSPEITO final?");
    let w = prompt("Qual a ARMA final?");
    let r = prompt("Qual o CÔMODO final?");

    if(s && w && r && 
       s.toLowerCase().includes(solution.suspect.name.toLowerCase()) && 
       w.toLowerCase().includes(solution.weapon.name.toLowerCase()) && 
       r.toLowerCase().includes(solution.room.name.toLowerCase())) {
      showEnd(true, `${cp.name} desvendou o crime! O assassino era ${solution.suspect.name} com ${solution.weapon.name} no(a) ${solution.room.name}.`);
    } else {
      alert(`Acusação INCORRETA! ${cp.name} foi eliminado das investigações e suas fichas saíram de cena.`);
      cp.eliminated = true;
      endTurn();
    }
  }
}

function endTurn() {
  turnIdx = (turnIdx + 1) % players.length;
  nextTurnTransition();
}

function showEnd(win, text) {
  document.getElementById('endscreen').style.display = 'flex';
  document.getElementById('end-title').textContent = win ? "VITÓRIA!" : "FRACASSO";
  document.getElementById('end-desc').textContent = text;
}
</script>
</body>
</html>
