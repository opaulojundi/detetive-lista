<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detetive — Mansão do Crime</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-l:#e8c96b;--gold-d:#8a6520;--cr:#8b1a1a;--cr-d:#5c0e0e;--cr-l:#c43a3a;--dk:#0d0a08;--dk2:#1a1410;--dk3:#2a2018;--parch:#f2e8d0;--parch2:#e8d8b0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Text',serif;background:var(--dk);color:var(--parch);overflow:hidden;width:100vw;height:100vh;user-select:none}

#gscreen{display:flex;width:100vw;height:100vh;flex-direction:column;overflow:hidden}

/* TOP BAR */
#topbar{height:50px;background:linear-gradient(90deg,#0d0a08,#1a1408,#0d0a08);border-bottom:2px solid var(--gold-d);display:flex;align-items:center;padding:0 14px;gap:14px;position:relative;z-index:50;flex-shrink:0}
#glogo{font-family:'Cinzel Decorative',serif;font-size:17px;color:var(--gold);text-shadow:0 0 10px rgba(201,168,76,.4);letter-spacing:2px}
.tbdiv{width:1px;height:22px;background:rgba(201,168,76,.3)}
#cpinfo{display:flex;align-items:center;gap:7px;font-family:'Cinzel',serif;font-size:13px}
#cpdot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.5)}
#cpname{color:var(--gold-l);font-weight:700}
.tbright{margin-left:auto;display:flex;gap:7px}
.tbtn{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;padding:5px 12px;cursor:pointer;letter-spacing:1px;border-radius:2px;transition:all .2s}
.tbtn:hover{background:rgba(201,168,76,.2)}

/* MAIN LAYOUT */
#main{flex:1;display:flex;overflow:hidden;min-height:0}

/* LEFT PANEL (CATEGORIES) */
#lpanel{width:260px;flex-shrink:0;background:linear-gradient(180deg,#0d0a08,#12100a);border-right:2px solid rgba(201,168,76,.2);display:flex;flex-direction:column;overflow:hidden}
.phdr{padding:10px 14px;border-bottom:1px solid rgba(201,168,76,.15);font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold);background:rgba(0,0,0,0.3)}
#mycp{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;justify-content:center}

/* CATEGORY BUTTONS */
.cat-btn{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--parch);background:linear-gradient(135deg,#231810,#140d08);border:1px solid rgba(201,168,76,.3);padding:16px;cursor:pointer;border-radius:4px;text-align:center;transition:all 0.3s;box-shadow:inset 0 0 10px rgba(0,0,0,0.5)}
.cat-btn:hover{border-color:var(--gold);background:linear-gradient(135deg,#2d2016,#1a110a);transform:translateY(-2px)}

/* BOARD AREA */
#barea{flex:1;min-width:0;min-height:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#130e06}
#bcontainer{position:relative;max-width:98%;max-height:98%}
#mansion-svg{display:block;border:3px solid var(--gold-d);box-shadow:0 0 50px rgba(0,0,0,.8);border-radius:2px}

.tok-group{cursor:pointer;transition:all 0.2s}
.tok-group:hover{filter:brightness(1.3)}

/* BOTTOM BAR */
#bottom{height:110px;flex-shrink:0;background:linear-gradient(180deg,#0d0a08,#0a0806);border-top:2px solid rgba(201,168,76,.2);display:flex;align-items:center;padding:0 20px;gap:20px}
#darea{display:flex;align-items:center;gap:14px}
#dcon{display:flex;gap:8px}
.die{width:46px;height:46px;background:linear-gradient(135deg,#f5f0e8,#e8dcc8);border:2px solid var(--gold-d);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 8px rgba(0,0,0,.5);color:#1a1008}
.die.rolling{animation:dr .5s ease-in-out}
@keyframes dr{0%{transform:rotate(0)}50%{transform:rotate(180deg) scale(1.1)}100%{transform:rotate(360deg)}}

#rollbtn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--dk);border:none;padding:10px 20px;cursor:pointer;border-radius:2px;font-weight:bold}
#rollbtn:disabled{opacity:.4;cursor:not-allowed}
#steps{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1px;font-weight:600}

#actarea{display:flex;gap:10px;margin-left:auto}
.abtn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);color:var(--gold);padding:10px 20px;cursor:pointer;transition:all .2s;border-radius:2px;min-width:140px;text-align:center}
.abtn:hover:not(:disabled){background:rgba(201,168,76,0.18);border-color:var(--gold)}
.abtn:disabled{opacity:.3;cursor:not-allowed}

#phdisp{text-align:right;min-width:150px}
#phtitle{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--gold)}
#phdesc{font-family:'IM Fell English',serif;font-style:italic;font-size:12px;color:var(--parch2);opacity:.7;margin-top:2px}

/* MODALS */
.gmodal{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}
.gmbox{background:linear-gradient(160deg,#1a1008,#2d1c08,#1a1008);border:3px solid var(--gold-d);padding:25px;max-width:440px;width:90%;position:relative;border-radius:4px}
.mtitle{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold);text-shadow:0 0 20px rgba(201,168,76,.3);text-align:center;margin-bottom:15px}
.mrow{margin-bottom:12px}
.mlabel{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold);opacity:.7;margin-bottom:4px}
.msel{width:100%;padding:8px 12px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);color:var(--parch);font-size:14px;border-radius:2px;outline:none;appearance:none}
.msel option{background:#1a1008;color:var(--parch)}
.mbtns{display:flex;gap:10px;margin-top:20px}
.mbtn{flex:1;padding:10px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;border:none;cursor:pointer;border-radius:2px}
.mbc{background:rgba(201,168,76,.1);color:var(--parch2);border:1px solid rgba(201,168,76,.2)}
.mbconf{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--dk);font-weight:bold}

/* INTERACTIVE CARD POPUP ENGINE */
#cardmodal .gmbox{max-width:320px;padding:30px 20px;display:flex;flex-direction:column;align-items:center}
.modal-card-wrapper{perspective:1000px;width:220px;height:320px;position:relative;margin:15px 0}
.modal-card-inner{width:100%;height:100%;position:absolute;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);cursor:pointer}
.modal-card-inner.flipped{transform:rotateY(180deg);cursor:default}
.mcard-front, .mcard-back{width:100%;height:100%;position:absolute;backface-visibility:hidden;border-radius:12px;border:2px solid var(--gold);box-shadow:0 10px 25px rgba(0,0,0,0.7)}
.mcard-back{background:linear-gradient(135deg,#2d1f14, #140d07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;color:var(--gold)}
.mcard-back .silhouette{font-size:70px;opacity:0.2;filter:drop-shadow(0 0 10px rgba(0,0,0,0.8))}
.mcard-back .click-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;opacity:0.7;text-align:center;padding:0 10px}
.mcard-front{transform:rotateY(180deg);background:linear-gradient(135deg,#23160a,#3d2714);padding:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:15px;text-align:center}
.mcard-list{display:flex;flex-direction:column;gap:12px;width:100%;overflow-y:auto}
.mcard-item{background:rgba(0,0,0,0.4);border:1px solid rgba(201,168,76,0.2);border-radius:6px;padding:10px;display:flex;align-items:center;gap:10px}
.mcard-item-icon{font-size:24px}
.mcard-item-name{font-family:'IM Fell English',serif;font-size:15px;color:var(--parch)}
.mcard-empty{font-family:'Crimson Text',serif;font-style:italic;font-size:14px;color:var(--parch2);opacity:0.6}

/* RESPONSIVE ADAPTATIONS */
@media (max-width: 860px) {
  #main{flex-direction:column-reverse}
  #lpanel{width:100%;height:80px;border-right:none;border-top:2px solid var(--gold-d)}
  #mycp{flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:10px;gap:10px;align-items:center}
  .cat-btn{padding:10px 15px;white-space:nowrap;flex:1}
  #bottom{height:auto;padding:10px;flex-wrap:wrap;gap:10px;justify-content:space-between}
  #actarea{margin-left:0;width:100%;justify-content:center}
}
</style>
</head>
<body>

<div id="gscreen">
  <div id="topbar">
    <div id="glogo">🕯 DETETIVE</div>
    <div class="tbdiv"></div>
    <div id="cpinfo">
      <div id="cpdot"></div>
      <span id="cpname">—</span>
    </div>
    <div class="tbright">
      <button class="tbtn" onclick="openSug()" id="sugbtn" disabled>💬 SUGESTÃO</button>
      <button class="tbtn" onclick="openAcc()" id="accbtn" style="color:#ff9999;border-color:rgba(200,50,50,0.4)">⚖️ ACUSAÇÃO</button>
    </div>
  </div>

  <div id="main">
    <div id="lpanel">
      <div class="phdr">CATEGORIAS DE CARTAS</div>
      <div id="mycp">
        <button class="cat-btn" onclick="openCardModal('suspect')">🕵️ VER SUSPEITOS</button>
        <button class="cat-btn" onclick="openCardModal('weapon')">🪓 VER ARMAS</button>
        <button class="cat-btn" onclick="openCardModal('room')">🏰 VER CÔMODOS</button>
      </div>
    </div>

    <div id="barea">
      <div id="bcontainer">
         </div>
    </div>
  </div>

  <div id="bottom">
    <div id="darea">
      <div id="dcon">
        <div class="die" id="die1">⚀</div>
        <div class="die" id="die2">⚁</div>
      </div>
      <button id="rollbtn" onclick="rollDice()">🎲 ROLAR DADOS</button>
      <div id="steps">PASSOS RESTANTES: <span id="stcount">0</span></div>
    </div>
    
    <div id="actarea">
      <button class="abtn" id="etbtn" onclick="endTurn()" disabled>⏭ ENCERRAR VEZ</button>
    </div>

    <div id="phdisp">
      <div id="phtitle">Ações</div>
      <div id="phdesc">Rolar os dados para andar</div>
    </div>
  </div>
</div>

<div class="gmodal" id="cardmodal">
  <div class="gmbox">
    <div class="mtitle" id="mcard-title">CATEGORIA</div>
    <div class="modal-card-wrapper">
      <div class="modal-card-inner" id="modal-card-inner" onclick="revealCategoryCards()">
        <div class="mcard-back">
          <div class="silhouette" id="mcard-silhouette">❓</div>
          <div class="click-label">CLIQUE PARA REVELAR</div>
        </div>
        <div class="mcard-front">
          <div class="mcard-list" id="mcard-list-dest">
             </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="gmodal" id="sugmodal">
  <div class="gmbox">
    <div class="mtitle">💬 Fazer Sugestão</div>
    <div class="mrow"><div class="mlabel">SUSPEITO</div><select class="msel" id="sugsus"></select></div>
    <div class="mrow"><div class="mlabel">ARMA</div><select class="msel" id="sugwep"></select></div>
    <div class="mrow"><div class="mlabel">CÔMODO (SALA ATUAL)</div><div style="font-family:'IM Fell English',serif;font-style:italic;font-size:15px;color:var(--gold);padding:5px 0" id="sugroom">—</div></div>
    <div class="mbtns">
      <button class="mbtn mbc" onclick="closeM('sugmodal')">CANCELAR</button>
      <button class="mbtn mbconf" onclick="confirmSug()">CONFIRMAR</button>
    </div>
  </div>
</div>

<div class="gmodal" id="accmodal">
  <div class="gmbox">
    <div class="mtitle" style="color:#ff9999">⚖️ Acusação Final</div>
    <div class="mrow"><div class="mlabel">SUSPEITO</div><select class="msel" id="accsus"></select></div>
    <div class="mrow"><div class="mlabel">ARMA</div><select class="msel" id="accwep"></select></div>
    <div class="mrow"><div class="mlabel">CÔMODO</div><select class="msel" id="accroom"></select></div>
    <div class="mbtns">
      <button class="mbtn mbc" onclick="closeM('accmodal')">CANCELAR</button>
      <button class="mbtn mbacc" style="background:var(--cr);color:#fff" onclick="confirmAcc()">ACUSAR TOTAL!</button>
    </div>
  </div>
</div>

<script>
const SUSPECTS = [
  { id:'sr_marinho', name:'Sr. Marinho', icon:'🔹', color:'#4a7cb5' },
  { id:'profa_filomela', name:'Profa. Filomela', icon:'🔸', color:'#e8c96b' },
  { id:'srta_rose', name:'Srta. Rose', icon:'🔺', color:'#c43a3a' },
  { id:'coronel_mostarda', name:'Coronel Mostarda', icon:'💛', color:'#d4a313' },
  { id:'dona_branca', name:'Dona Branca', icon:'⚪', color:'#ffffff' },
  { id:'o_reverendo', name:'Reverendo Green', icon:'💚', color:'#3a8c4a' }
];

const WEAPONS = [
  { id:'corda', name:'Corda', icon:'🪢' },
  { id:'cano', name:'Cano de Ferro', icon:'🛠️' },
  { id:'faca', name:'Faca', icon:'🔪' },
  { id:'chave', name:'Chave Inglesa', icon:'🔧' },
  { id:'castical', name:'Castiçal', icon:'🕯️' },
  { id:'revolver', name:'Revólver', icon:'🔫' }
];

const ROOMS = [
  { id:'cozinha', name:'Cozinha', x:120, y:120 },
  { id:'sala_baile', name:'Sala de Baile', x:350, y:110 },
  { id:'estufa', name:'Estufa', x:580, y:120 },
  { id:'bilhar', name:'Salão de Bilhar', x:580, y:260 },
  { id:'biblioteca', name:'Biblioteca', x:580, y:420 },
  { id:'escritorio', name:'Escritório', x:590, y:560 },
  { id:'hall', name:'Hall Central', x:350, y:550 },
  { id:'sala_estar', name:'Sala de Estar', x:120, y:560 },
  { id:'sala_jantar', name:'Sala de Jantar', x:120, y:340 }
];

let totalPlayersCount = parseInt(localStorage.getItem('cluedo_player_count')) || 3;
let players = [];
let activeTurnIndex = 0;
let diceRolled = false;
let stepsRemaining = 0;
let envelope = {};
let currentModalCategory = '';
let isRevelationActive = false;

function setupGame() {
    let crSus = SUSPECTS[Math.floor(Math.random()*SUSPECTS.length)];
    let crWep = WEAPONS[Math.floor(Math.random()*WEAPONS.length)];
    let crRom = ROOMS[Math.floor(Math.random()*ROOMS.length)];
    envelope = { suspect: crSus, weapon: crWep, room: crRom };

    let fullDeck = [...SUSPECTS, ...WEAPONS, ...ROOMS].filter(c => c.id!==crSus.id && c.id!==crWep.id && c.id!==crRom.id);
    fullDeck.sort(() => Math.random() - 0.5);

    for(let i=0; i<totalPlayersCount; i++) {
        players.push({
            index: i,
            name: `Jogador ${i + 1}`,
            character: SUSPECTS[i],
            cards: [],
            currentRoom: ROOMS[Math.floor(Math.random() * ROOMS.length)].id,
            eliminated: false
        });
    }

    let pIdx = 0;
    while(fullDeck.length > 0) {
        players[pIdx % totalPlayersCount].cards.push(fullDeck.pop());
        pIdx++;
    }

    buildSVGBoard();
    populateSelects();
    startTurn();
}

function buildSVGBoard() {
    let html = `<svg id="mansion-svg" width="700" height="680" viewBox="0 0 700 680" xmlns="http://www.w3.org/2000/svg">`;
    html += `<rect width="700" height="680" fill="#1c1610"/>`;
    
    ROOMS.forEach(r => {
        let isCurrent = players[activeTurnIndex].currentRoom === r.id;
        let strokeColor = isCurrent ? 'var(--gold-l)' : 'var(--gold-d)';
        let fillBG = isCurrent ? '#2a1e12' : '#140e0a';
        
        html += `<g id="room-rect-${r.id}" onclick="handleRoomClick('${r.id}')" style="cursor:pointer">
            <rect x="${r.x-75}" y="${r.y-50}" width="150" height="100" fill="${fillBG}" stroke="${strokeColor}" stroke-width="2" rx="4"/>
            <text x="${r.x}" y="${r.y}" fill="var(--parch)" font-family="Cinzel" font-size="12" text-anchor="middle" font-weight="600">${r.name.toUpperCase()}</text>
        </g>`;
    });

    players.forEach((p) => {
        if(p.eliminated) return;
        let rObj = ROOMS.find(r => r.id === p.currentRoom);
        if(rObj) {
            let offset = (p.index * 16) - ((totalPlayersCount-1)*8);
            html += `<g class="tok-group">
                <circle cx="${rObj.x + offset}" cy="${rObj.y + 30}" r="10" fill="${p.character.color}" stroke="#000" stroke-width="1.5"/>
                <text x="${rObj.x + offset}" y="${rObj.y + 33}" font-size="9" fill="#000" font-weight="900" text-anchor="middle">${p.index+1}</text>
            </g>`;
        }
    });

    html += `</svg>`;
    document.getElementById('bcontainer').innerHTML = html;
}

function rollDice() {
    if(diceRolled) return;
    
    let d1 = Math.floor(Math.random() * 6) + 1;
    let d2 = Math.floor(Math.random() * 6) + 1;
    
    document.getElementById('die1').classList.add('rolling');
    document.getElementById('die2').classList.add('rolling');
    
    setTimeout(() => {
        document.getElementById('die1').classList.remove('rolling');
        document.getElementById('die2').classList.remove('rolling');
        
        const diceGlyphs = ['⚀','⚀','⚁','⚂','⚃','⚄','⚅'];
        document.getElementById('die1').textContent = diceGlyphs[d1];
        document.getElementById('die2').textContent = diceGlyphs[d2];
        
        stepsRemaining = d1 + d2;
        diceRolled = true;
        
        document.getElementById('stcount').textContent = stepsRemaining;
        document.getElementById('rollbtn').disabled = true;
        document.getElementById('etbtn').disabled = false;
        
        document.getElementById('phdesc').textContent = `Você tirou ${stepsRemaining}. Clique em uma sala para mover.`;
    }, 500);
}

function handleRoomClick(roomId) {
    if(!diceRolled || stepsRemaining <= 0) return;
    
    let activePlayer = players[activeTurnIndex];
    if(activePlayer.currentRoom === roomId) return;
    
    let cost = Math.floor(Math.random() * 4) + 3;
    
    if(stepsRemaining >= cost) {
        stepsRemaining -= cost;
        activePlayer.currentRoom = roomId;
        document.getElementById('stcount').textContent = stepsRemaining;
        
        document.getElementById('sugbtn').disabled = false;
        document.getElementById('phdesc').textContent = `Moveu-se para a sala! Passos restantes: ${stepsRemaining}.`;
        
        buildSVGBoard();
    } else {
        alert(`Dados Insuficientes! Você precisa de pelo menos ${cost} passos para alcançar este aposento.`);
    }
}

function startTurn() {
    let cp = players[activeTurnIndex];
    if(cp.eliminated) {
        nextTurn();
        return;
    }

    diceRolled = false;
    stepsRemaining = 0;
    isRevelationActive = false;
    
    document.getElementById('cpname').textContent = `${cp.name} (${cp.character.name})`;
    document.getElementById('cpdot').style.backgroundColor = cp.character.color;
    document.getElementById('stcount').textContent = '0';
    
    document.getElementById('rollbtn').disabled = false;
    document.getElementById('etbtn').disabled = true;
    document.getElementById('sugbtn').disabled = true;
    
    document.getElementById('phdesc').textContent = `Role os dados para iniciar seu turno.`;
    buildSVGBoard();
}

/* SISTEMA POP-UP REVELAÇÃO CATEGORIAS COM TIMER */
function openCardModal(category) {
    if (isRevelationActive) return; // Trava interações concorrentes durante o timer
    
    currentModalCategory = category;
    let title = '';
    let silhouette = '❓';
    
    if(category === 'suspect') { title = 'SUSPEITOS'; silhouette = '👤'; }
    if(category === 'weapon') { title = 'ARMAS'; silhouette = '⚔️'; }
    if(category === 'room') { title = 'CÔMODOS'; silhouette = '🏰'; }
    
    document.getElementById('mcard-title').textContent = title;
    document.getElementById('mcard-silhouette').textContent = silhouette;
    
    // Resetar estado de rotação do card interno do pop-up
    document.getElementById('modal-card-inner').classList.remove('flipped');
    
    // Montar a lista interna oculta correspondente ao jogador ativo
    let cp = players[activeTurnIndex];
    let filteredCards = [];
    
    if(category === 'suspect') filteredCards = cp.cards.filter(c => SUSPECTS.some(s => s.id === c.id));
    if(category === 'weapon') filteredCards = cp.cards.filter(c => WEAPONS.some(w => w.id === c.id));
    if(category === 'room') filteredCards = cp.cards.filter(c => ROOMS.some(r => r.id === c.id));
    
    let listDest = document.getElementById('mcard-list-dest');
    listDest.innerHTML = '';
    
    if(filteredCards.length === 0) {
        listDest.innerHTML = `<div class="mcard-empty">Nenhuma carta nesta categoria</div>`;
    } else {
        filteredCards.forEach(card => {
            listDest.innerHTML += `
              <div class="mcard-item">
                <div class="mcard-item-icon">${card.icon || '🃏'}</div>
                <div class="mcard-item-name">${card.name}</div>
              </div>`;
        });
    }
    
    document.getElementById('cardmodal').style.display = 'flex';
}

function revealCategoryCards() {
    let cardInner = document.getElementById('modal-card-inner');
    if (cardInner.classList.contains('flipped') || isRevelationActive) return;
    
    isRevelationActive = true;
    cardInner.classList.add('flipped');
    
    // Aguarda 3 segundos exibindo a carta e fecha automaticamente
    setTimeout(() => {
        cardInner.classList.remove('flipped');
        setTimeout(() => {
            closeM('cardmodal');
            isRevelationActive = false;
        }, 400); // tempo da transição CSS reversa
    }, 3000);
}

function endTurn() {
    nextTurn();
}

function nextTurn() {
    activeTurnIndex = (activeTurnIndex + 1) % totalPlayersCount;
    startTurn();
}

function openSug() {
    let cp = players[activeTurnIndex];
    let rObj = ROOMS.find(r => r.id === cp.currentRoom);
    document.getElementById('sugroom').textContent = rObj.name.toUpperCase();
    document.getElementById('sugmodal').style.display = 'flex';
}

function confirmSug() {
    let susSel = document.getElementById('sugsus').value;
    let wepSel = document.getElementById('sugwep').value;
    let cp = players[activeTurnIndex];
    let rObj = ROOMS.find(r => r.id === cp.currentRoom);

    closeM('sugmodal');
    
    let nextPlayerIdx = (activeTurnIndex + 1) % totalPlayersCount;
    let matchFound = null;

    for (let i = 0; i < totalPlayersCount - 1; i++) {
        let checker = players[(nextPlayerIdx + i) % totalPlayersCount];
        if (checker.index === cp.index) break;
        
        matchFound = checker.cards.find(c => c.id === susSel || c.id === wepSel || c.id === rObj.id);
        if (matchFound) {
            alert(`O ${checker.name} provou que a sua dedução está incorreta mostrando uma carta oculta.`);
            break;
        }
    }

    if (!matchFound) {
        alert("Nenhum jogador conseguiu contestar a sua acusação! Anote em seus registros.");
    }
    
    document.getElementById('sugbtn').disabled = true;
}

function openAcc() {
    document.getElementById('accmodal').style.display = 'flex';
}

function confirmAcc() {
    let sus = document.getElementById('accsus').value;
    let wep = document.getElementById('accwep').value;
    let rom = document.getElementById('accroom').value;
    let cp = players[activeTurnIndex];

    closeM('accmodal');

    if(envelope.suspect.id === sus && envelope.weapon.id === wep && envelope.room.id === rom) {
        alert(`PARABÉNS! O ${cp.name} desvendou o crime perfeitamente! Assassino: ${envelope.suspect.name}, Arma: ${envelope.weapon.name}, Sala: ${envelope.room.name}.`);
        window.location.href = 'index.html';
    } else {
        alert(`ACUSAÇÃO INCORRETA! O ${cp.name} errou o veredito e foi desqualificado das investigações.`);
        cp.eliminated = true;
        
        let alive = players.filter(p => !p.eliminated);
        if(alive.length === 0) {
            alert(`Fim de jogo! Todos falharam. Solução original: ${envelope.suspect.name} com ${envelope.weapon.name} na sala ${envelope.room.name}.`);
            window.location.href = 'index.html';
        } else {
            endTurn();
        }
    }
}

function closeM(id) { document.getElementById(id).style.display = 'none'; }

function populateSelects() {
    let sSus = document.getElementById('sugsus'), aSus = document.getElementById('accsus');
    let sWep = document.getElementById('sugwep'), aWep = document.getElementById('accwep');
    let aRom = document.getElementById('accroom');

    SUSPECTS.forEach(s => {
        sSus.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        aSus.innerHTML += `<option value="${s.id}">${s.name}</option>`;
    });
    WEAPONS.forEach(w => {
        sWep.innerHTML += `<option value="${w.id}">${w.name}</option>`;
        aWep.innerHTML += `<option value="${w.id}">${w.name}</option>`;
    });
    ROOMS.forEach(r => {
        aRom.innerHTML += `<option value="${r.id}">${r.name}</option>`;
    });
}

window.onload = setupGame;
</script>
</body>
